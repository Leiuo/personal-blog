<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 背景光晕 -->
  <circle cx="600" cy="300" r="400" fill="url(#glow)"/>

  <!-- 网格线装饰 -->
  <g opacity="0.04" stroke="white" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- 指南针图标（中心偏左） -->
  <g transform="translate(300, 315)">
    <!-- 外圈 -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.15"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.1"/>

    <!-- 方位标记 -->
    <g font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#38BDF8" opacity="0.6">
      <text x="0" y="-95" text-anchor="middle">N</text>
      <text x="0" y="105" text-anchor="middle">S</text>
      <text x="103" y="7" text-anchor="middle">E</text>
      <text x="-103" y="7" text-anchor="middle">W</text>
    </g>

    <!-- 刻度线 -->
    <g stroke="#94A3B8" opacity="0.2" stroke-width="1.5">
      <line x1="0" y1="-118" x2="0" y2="-108"/>
      <line x1="0" y1="108" x2="0" y2="118"/>
      <line x1="118" y1="0" x2="108" y2="0"/>
      <line x1="-118" y1="0" x2="-108" y2="0"/>
      <line x1="57" y1="-103" x2="52" y2="-94" transform="rotate(0)"/>
    </g>

    <!-- 指针（指向右上方，象征进步） -->
    <polygon points="0,-60 12,0 -8,15 0,-60" fill="url(#accent)" transform="rotate(35)"/>
    <polygon points="0,60 -12,0 8,-15 0,60" fill="#64748B" opacity="0.4" transform="rotate(35)"/>

    <!-- 中心点 -->
    <circle cx="0" cy="0" r="6" fill="url(#accent)"/>
    <circle cx="0" cy="0" r="3" fill="white"/>
  </g>

  <!-- 右侧文字区域 -->
  <g transform="translate(580, 260)">
    <!-- 小标签 -->
    <rect x="0" y="0" width="90" height="28" rx="6" fill="#38BDF8" opacity="0.15"/>
    <text x="45" y="19" font-family="system-ui, sans-serif" font-size="13" fill="#38BDF8" text-anchor="middle" font-weight="600">AI 驱动</text>

    <!-- 主标题 -->
    <text x="0" y="70" font-family="system-ui, sans-serif" font-size="52" fill="white" font-weight="800" letter-spacing="-1">
      CareerCompass
    </text>

    <!-- 副标题 -->
    <text x="0" y="110" font-family="system-ui, sans-serif" font-size="20" fill="#94A3B8" font-weight="400" letter-spacing="0.5">
      智能职业导航平台
    </text>

    <!-- 特性标签 -->
    <g transform="translate(0, 150)">
      <rect x="0" y="0" width="105" height="30" rx="15" fill="none" stroke="#334155" stroke-width="1"/>
      <text x="52" y="20" font-family="system-ui, sans-serif" font-size="13" fill="#CBD5E1" text-anchor="middle">Google Gemini</text>

      <rect x="115" y="0" width="70" height="30" rx="15" fill="none" stroke="#334155" stroke-width="1"/>
      <text x="150" y="20" font-family="system-ui, sans-serif" font-size="13" fill="#CBD5E1" text-anchor="middle">Next.js</text>

      <rect x="195" y="0" width="62" height="30" rx="15" fill="none" stroke="#334155" stroke-width="1"/>
      <text x="226" y="20" font-family="system-ui, sans-serif" font-size="13" fill="#CBD5E1" text-anchor="middle">React</text>
    </g>
  </g>

  <!-- 底部装饰线 -->
  <rect x="0" y="625" width="1200" height="5" fill="url(#accent)"/>
</svg>
