<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1120"/>
      <stop offset="50%" stop-color="#1A2744"/>
      <stop offset="100%" stop-color="#0B1120"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4FACFE"/>
      <stop offset="100%" stop-color="#00F2FE"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4FACFE"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#4FACFE" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4FACFE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 背景光晕 -->
  <circle cx="300" cy="300" r="350" fill="url(#glow)"/>
  <circle cx="900" cy="350" r="300" fill="url(#glow2)"/>

  <!-- 网格线装饰 -->
  <g opacity="0.03" stroke="white" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- 左侧：监控仪表盘图标 -->
  <g transform="translate(280, 315)">
    <!-- 外层装饰圆环 -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="#4FACFE" stroke-width="1.5" opacity="0.12"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="#4FACFE" stroke-width="1" opacity="0.08"/>

    <!-- 仪表盘圆弧 (深色部分) -->
    <path d="M -100 40 A 110 110 0 0 1 100 40" fill="none" stroke="#1E293B" stroke-width="28" stroke-linecap="round"/>
    <!-- 仪表盘圆弧 (已用量，约 65%) -->
    <path d="M -100 40 A 110 110 0 0 1 35 -95" fill="none" stroke="url(#accent)" stroke-width="28" stroke-linecap="round" opacity="0.9"/>

    <!-- 仪表盘刻度标记 -->
    <g stroke="#94A3B8" opacity="0.25" stroke-width="2">
      <!-- 底部刻度 -->
      <line x1="-90" y1="61" x2="-90" y2="78" transform="rotate(-65, -90, 75)"/>
      <line x1="-30" y1="61" x2="-30" y2="78" transform="rotate(-30, -30, 100)"/>
      <line x1="30" y1="61" x2="30" y2="78" transform="rotate(30, 30, 100)"/>
      <line x1="90" y1="61" x2="90" y2="78" transform="rotate(65, 90, 75)"/>
    </g>

    <!-- 仪表盘指针 -->
    <line x1="0" y1="0" x2="25" y2="-100" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <!-- 仪表盘中心 -->
    <circle cx="0" cy="0" r="10" fill="#1E293B" stroke="url(#accent)" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="white"/>

    <!-- 小柱状图 (右下) -->
    <g transform="translate(90, 50)">
      <rect x="0" y="-20" width="12" height="20" rx="3" fill="#4FACFE" opacity="0.5"/>
      <rect x="18" y="-35" width="12" height="35" rx="3" fill="#4FACFE" opacity="0.65"/>
      <rect x="36" y="-28" width="12" height="28" rx="3" fill="#4FACFE" opacity="0.75"/>
      <rect x="54" y="-50" width="12" height="50" rx="3" fill="url(#accent)" opacity="0.9"/>
    </g>

    <!-- 折线图 (左上) -->
    <g transform="translate(-120, -60)">
      <polyline points="0,0 20,-15 40,-5 60,-30 80,-20"
                fill="none" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
      <circle cx="0" cy="0" r="4" fill="#8B5CF6" opacity="0.8"/>
      <circle cx="20" cy="-15" r="4" fill="#8B5CF6" opacity="0.8"/>
      <circle cx="40" cy="-5" r="4" fill="#8B5CF6" opacity="0.8"/>
      <circle cx="60" cy="-30" r="4" fill="#8B5CF6" opacity="0.8"/>
      <circle cx="80" cy="-20" r="4" fill="#8B5CF6" opacity="0.8"/>
    </g>
  </g>

  <!-- 右侧文字区域 -->
  <g transform="translate(560, 225)">
    <!-- 小标签 -->
    <rect x="0" y="0" width="120" height="28" rx="6" fill="#4FACFE" opacity="0.12"/>
    <text x="60" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4FACFE" text-anchor="middle" font-weight="600">项目推荐</text>

    <!-- 主标题 -->
    <text x="0" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="44" fill="white" font-weight="800" letter-spacing="-1">
      DeepSeek Monitor
    </text>

    <!-- 副标题 -->
    <text x="0" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="19" fill="#94A3B8" font-weight="400" letter-spacing="0.5">
      DeepSeek API 用量监控 Windows 桌面应用
    </text>

    <!-- 技术标签 -->
    <g transform="translate(0, 150)">
      <rect x="0" y="0" width="72" height="30" rx="15" fill="none" stroke="#334155" stroke-width="1"/>
      <text x="36" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1" text-anchor="middle">Tauri 2</text>

      <rect x="82" y="0" width="70" height="30" rx="15" fill="none" stroke="#334155" stroke-width="1"/>
      <text x="117" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1" text-anchor="middle">React 18</text>

      <rect x="162" y="0" width="55" height="30" rx="15" fill="none" stroke="#334155" stroke-width="1"/>
      <text x="189" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1" text-anchor="middle">Rust</text>

      <rect x="227" y="0" width="80" height="30" rx="15" fill="none" stroke="#334155" stroke-width="1"/>
      <text x="267" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1" text-anchor="middle">DeepSeek</text>
    </g>
  </g>

  <!-- 底部装饰线 -->
  <rect x="0" y="625" width="1200" height="5" fill="url(#accent)"/>
</svg>
